name: Test Windows Signing Setup Action

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  push:
    branches: [ main ]

jobs:
  test-sign:
    runs-on: windows-latest

    strategy:
      matrix:
        simplysign:
          # Forces a bad first token: exercises the token-only recovery path.
          - version: '9.4.3.90'
            url: 'https://files.certum.eu/software/SimplySignDesktop/Windows/9.4.3.90/SimplySignDesktop-9.4.3.90-64-bit-en.msi'
            scenario: 'bad-token'
            forceBadToken: true
          # Forces a bad first username: a token-only retry can never fix it, so
          # this exercises the escalation to a full credential re-entry.
          - version: '9.4.3.90'
            url: 'https://files.certum.eu/software/SimplySignDesktop/Windows/9.4.3.90/SimplySignDesktop-9.4.3.90-64-bit-en.msi'
            scenario: 'bad-username'
            forceBadUsername: true
          - version: '9.4.2.86' # Testing update proposal
            url: 'https://files.certum.eu/software/SimplySignDesktop/Windows/9.4.2.86/SimplySignDesktop-9.4.2.86-64-bit-en.msi'
            scenario: 'outdated'
            outdated: true

    name: test-sign (SimplySign ${{ matrix.simplysign.version }} / ${{ matrix.simplysign.scenario }})

    # Test-only hooks: deterministically force the first submission to fail so the
    # recovery paths are exercised. An empty value (flag unset on an entry) is not
    # 'true', so the hook is a no-op there. The "outdated" entry forces neither and
    # naturally raises the update dialog instead. Set at job level so the values
    # reliably propagate into the composite action's steps.
    env:
      SS_TEST_FORCE_BAD_FIRST_TOKEN: ${{ matrix.simplysign.forceBadToken }}
      SS_TEST_FORCE_BAD_FIRST_USERNAME: ${{ matrix.simplysign.forceBadUsername }}

    steps:
      - name: Checkout Action Code
        uses: actions/checkout@v6

      - name: Verify this is the latest SimplySign version
        if: ${{ !matrix.simplysign.outdated }}
        shell: pwsh
        run: |
          $base = "https://files.certum.eu/software/SimplySignDesktop/Windows"
          $html = Invoke-WebRequest -Uri "$base/" -UseBasicParsing
          $versions = [regex]::Matches($html.Content, 'href="([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)/"') `
            | ForEach-Object { $_.Groups[1].Value }
          $actualLatest = $versions | Sort-Object { [version]$_ } | Select-Object -Last 1

          Write-Host "Expected latest: ${{ matrix.simplysign.version }}"
          Write-Host "Actual latest:   $actualLatest"

          if ($actualLatest -ne "${{ matrix.simplysign.version }}") {
            Write-Error "❌ Version mismatch! Update the matrix: latest is $actualLatest"
            exit 1
          }

          Write-Host "✅ Version ${{ matrix.simplysign.version }} is confirmed latest."

      - name: Cache SimplySign Installer
        uses: actions/cache@v5
        with:
          path: SimplySignDesktop.msi
          key: simplysign-msi-${{ matrix.simplysign.url }}

      - name: Create Dummy File to Sign
        shell: pwsh
        run: |
          Set-Content -Path "test-app.ps1" -Value "Write-Host 'This is a test signed file!'"
          Write-Host "Created test-app.ps1"

      - name: Run Windows App Signing Action
        uses: ./
        with:
          certum-username: ${{ secrets.CERTUM_USERNAME }}
          certum-otp-uri: ${{ secrets.CERTUM_OTP_URI }}
          certum-key-id: ${{ secrets.CERTUM_KEY_ID }}
          simplysign-url: ${{ matrix.simplysign.url }}
          capture-diagnostics: 'true'

      - name: Assert two-window recovery path ran
        # Both forced-failure entries (bad-token, bad-username) are guaranteed to
        # hit a modal popup; the script sets SS_DIALOG_HANDLED=true when it recovers
        # from one. The outdated entry is skipped (its update dialog is separate).
        if: ${{ !matrix.simplysign.outdated }}
        shell: pwsh
        run: |
          if ($env:SS_DIALOG_HANDLED -eq 'true') {
            Write-Host "✅ Modal popup was detected and recovered from (two-window path exercised)."
          } else {
            Write-Error "❌ Expected the invalid-token dialog to be handled, but SS_DIALOG_HANDLED was not set. The recovery path did not run."
            exit 1
          }

      - name: Upload diagnostic screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Include the scenario: the bad-token and bad-username entries share the
          # same version, and upload-artifact@v4 rejects duplicate artifact names.
          name: simplysign-diag-${{ matrix.simplysign.version }}-${{ matrix.simplysign.scenario }}
          path: simplysign-diag-*.png
          if-no-files-found: ignore

      #- name: Reverse RDP via ngrok
      #  if: ${{ matrix.simplysign.outdated }}
      #  uses: ./.github/actions/reverse-rdp-windows
      #  with:
      #    ngrok-token: ${{ secrets.NGROK_AUTH_TOKEN }}
      #    password: ${{ secrets.RDP_PASSWORD }}

      - name: Add SignTool to PATH
        shell: pwsh
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\" -Filter signtool.exe -Recurse | Where-Object { $_.FullName -match 'x64' } | Select-Object -First 1
          
          if ($signtool) {
              $signtoolDir = Split-Path $signtool.FullName
              Write-Host "✅ Adding SignTool to PATH: $signtoolDir"
              echo "$signtoolDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
              Write-Error "❌ SignTool.exe not found in Windows SDK folders."
              exit 1
          }

      - name: Manual Signing Step
        shell: pwsh
        run: |
          Write-Host "✅ Signing setup complete."
          Write-Host "Proceeding with manual signing step..."
          
          $keyId = "${{ secrets.CERTUM_KEY_ID }}"
          $fileToSign = "test-app.ps1"
          $tsaUrl = "http://time.certum.pl/"
          
          signtool.exe sign /sha1 $keyId /tr $tsaUrl /td sha256 /fd sha256 $fileToSign
          
          if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Manual code signing failed. Signtool exit code: $LASTEXITCODE"
              exit 1
          } else {
              Write-Host "✅ Manual file signing completed successfully."
          }

      - name: Verify Signature
        shell: pwsh
        run: |
          Write-Host "Verifying signature on test-app.ps1..."
          $sig = Get-AuthenticodeSignature -FilePath "test-app.ps1"
          if ($sig.Status -eq 'Valid') {
            Write-Host "✅ SUCCESS: test-app.ps1 is signed and valid."
            Write-Host "Signed by: $($sig.SignerCertificate.Subject)"
          } else {
            Write-Error "❌ FAILED: Signature is not valid. Status: $($sig.Status)"
            exit 1
          }
